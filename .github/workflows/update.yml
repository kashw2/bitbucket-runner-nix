name: Update
on:
  schedule:
    - cron: 0 6 * * 1 # Weekly
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
      - uses: cachix/install-nix-action@v31.10.5
        with:
          nix_path: nixpkgs=flake:nixpkgs
      - run: nix develop --command nix-update --flake bitbucket-runner --use-update-script --no-src
      - if: ${{ env.ACT }}
        run: git remote set-url origin https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/${{ github.repository }}.git
      - uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GH_TOKEN }}
          branch: update/bitbucket-runner
          delete-branch: true
          add-paths: package.nix
          commit-message: 'build(package): update bitbucket-runner'
          title: 'build(package): update bitbucket-runner'
          body: Automated update via `nix-update` (`passthru.updateScript`).
